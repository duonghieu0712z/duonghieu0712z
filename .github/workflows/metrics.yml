name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    name: Github Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GIST_TOKEN }}
          output_action: gist
          committer_gist: ${{ secrets.GIST_ID }}
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_repositories: yes
          plugin_repositories_pinned: 6

  github-snake:
    name: GitHub Snake
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Upload light snake to gist
        uses: exuanbo/actions-deploy-gist@v1.1.4
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: dist/github-snake.svg
          gist_file_name: github-snake.svg

      - name: Upload dark snake to gist
        uses: exuanbo/actions-deploy-gist@v1.1.4
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: dist/github-snake-dark.svg
          gist_file_name: github-snake-dark.svg
