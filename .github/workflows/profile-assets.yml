name: Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assets:
    name: Generate profile assets
    runs-on: ubuntu-latest

    steps:
      - name: Prepare assets directory
        run: mkdir -p dist

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_display: large
          output_action: none
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_repositories: yes
          plugin_repositories_order: featured, pinned, starred, random
          plugin_repositories_pinned: 6

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Copy metrics SVG
        run: cp /metrics_renders/metrics.svg dist/metrics.svg

      - name: Publish profile assets to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          keep_history: true
          build_dir: dist
          jekyll: false
          commit_message: "ci(profile-assets): update profile assets"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
