name: Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    name: Generate metrics
    runs-on: ubuntu-latest

    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GIST_TOKEN }}
          output_action: gist
          committer_gist: ${{ secrets.GIST_ID }}
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_repositories: yes
          plugin_repositories_pinned: 6

  snake:
    name: Generate contribution snake
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Upload snake SVGs to gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          jq -n \
            --rawfile light dist/github-snake.svg \
            --rawfile dark dist/github-snake-dark.svg \
            '{files: {"github-snake.svg": {content: $light}, "github-snake-dark.svg": {content: $dark}}}' > payload.json

          curl --fail \
            --request PATCH \
            --header "Authorization: Bearer $GIST_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists/$GIST_ID" \
            --data @payload.json
